name: Simple Workflow

on:
  push:

jobs:
  hello:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute image tag
        id: vars
        run: |
          VERSION=$(node -p "require('./package.json').version")
          IMAGE_TAG="${VERSION}-${GITHUB_SHA::10}"

          echo "image_tag=$IMAGE_TAG" >> "$GITHUB_OUTPUT"

          echo "Version: $VERSION"
          echo "Image Tag: $IMAGE_TAG"

      - name: Build
        id: build-image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile

          load: true

          tags: |
            testt:${{ steps.vars.outputs.image_tag }}
            testt:latest

          build-args: |
            IMAGE_TAG=${{ steps.vars.outputs.image_tag }}

          cache-from: type=gha,scope=testt
          cache-to: type=gha,scope=testt,mode=max

      - name: Export outputs
        run: |
          echo "image=testt:${{ steps.vars.outputs.image_tag }}" >> $GITHUB_OUTPUT